<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBP & Dirman Advocate's | Law Firm</title>
<meta name="description" content="IBP & Dirman Advocate's - Firma hukum futuristik dengan integritas, kualitas dan ketuntasan.">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0f1b2d;--navy-light:#1a2a42;--navy-mid:#243b53;
  --gold:#c9a84c;--gold-light:#e2c975;--gold-dim:rgba(201,168,76,0.15);
  --teal:#0d9488;--teal-light:#14b8a6;--teal-dim:rgba(13,148,136,0.1);
  --white:#fff;--off-white:#f8f9fb;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
  --g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;--g900:#111827;
  --radius:10px;--radius-lg:16px;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06);
  --shadow:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 12px 28px rgba(0,0,0,0.12);
  --shadow-xl:0 24px 48px rgba(0,0,0,0.14);
}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:var(--g800);background:var(--white);line-height:1.6;overflow-x:hidden}
img{max-width:100%;display:block}a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;background:none;font-family:inherit}
ul{list-style:none}h1,h2,h3,h4{line-height:1.2;font-family:'DM Serif Display','DM Sans',serif}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-50px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes typewriter{from{width:0}to{width:100%}}
@keyframes blink{50%{border-color:transparent}}
@keyframes countPulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.6}100%{transform:scale(4);opacity:0}}

.animate-item{opacity:0;transform:translateY(40px);transition:all 0.7s var(--ease)}
.animate-item.visible{opacity:1;transform:translateY(0)}
.animate-item.visible.delay-1{transition-delay:0.1s}
.animate-item.visible.delay-2{transition-delay:0.2s}
.animate-item.visible.delay-3{transition-delay:0.3s}
.animate-item.visible.delay-4{transition-delay:0.4s}
.animate-item.visible.delay-5{transition-delay:0.5s}

.stagger-item{opacity:0;transform:translateY(30px) scale(0.97);transition:all 0.6s var(--ease)}
.stagger-item.visible{opacity:1;transform:translateY(0) scale(1)}

/* Scroll progress bar */
.scroll-progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--teal));z-index:1001;transition:width 0.1s linear}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;transition:all 0.4s var(--ease);background:transparent}
.nav.scrolled{background:rgba(255,255,255,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--g200);box-shadow:var(--shadow-sm)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:76px}
.nav-logo{display:flex;align-items:center;gap:12px;font-weight:700;font-size:1.1rem;transition:color 0.3s}
.nav-logo-icon{width:42px;height:42px;border-radius:10px;overflow:hidden;transition:transform 0.3s}
.nav-logo-icon img{width:100%;height:100%;object-fit:cover}
.nav-logo-icon:hover{transform:rotate(-5deg) scale(1.05)}
.nav-links{display:flex;gap:8px}
.nav-link-item{padding:8px 16px;font-size:0.88rem;font-weight:500;border-radius:8px;transition:all 0.3s;position:relative;font-family:'DM Sans',sans-serif}
.nav-link-item:hover{background:var(--g100)}
.nav-link-item.active{color:var(--teal);font-weight:600}
.nav-actions{display:flex;align-items:center;gap:14px}
.lang-switch{display:flex;background:var(--g100);border-radius:24px;padding:3px;font-size:0.78rem;font-weight:600;font-family:'DM Sans',sans-serif}
.lang-btn{padding:7px 16px;border-radius:22px;transition:all 0.3s;color:var(--g500)}
.lang-btn.active{background:var(--white);color:var(--navy);box-shadow:var(--shadow-sm)}
.nav-cta-btn{padding:10px 24px;background:var(--navy);color:var(--white);border-radius:8px;font-size:0.85rem;font-weight:600;transition:all 0.3s;font-family:'DM Sans',sans-serif;position:relative;overflow:hidden}
.nav-cta-btn:hover{background:var(--navy-light);transform:translateY(-1px);box-shadow:var(--shadow)}
.hamburger{display:none;flex-direction:column;gap:5px;padding:8px}
.hamburger span{width:22px;height:2px;background:var(--navy);border-radius:2px;transition:all 0.3s}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

/* For light nav on hero */
.nav:not(.scrolled) .nav-logo{color:var(--white)}
.nav:not(.scrolled) .nav-link-item{color:rgba(255,255,255,0.8)}
.nav:not(.scrolled) .nav-link-item:hover{background:rgba(255,255,255,0.1);color:var(--white)}
.nav:not(.scrolled) .nav-link-item.active{color:var(--gold-light);background:rgba(255,255,255,0.08)}
.nav:not(.scrolled) .lang-switch{background:rgba(255,255,255,0.12)}
.nav:not(.scrolled) .lang-btn{color:rgba(255,255,255,0.6)}
.nav:not(.scrolled) .lang-btn.active{background:rgba(255,255,255,0.2);color:var(--white)}
.nav:not(.scrolled) .nav-cta-btn{background:var(--gold);color:var(--navy)}
.nav:not(.scrolled) .hamburger span{background:var(--white)}

/* Mobile menu */
.mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:998;opacity:0;pointer-events:none;transition:opacity 0.3s}
.mobile-overlay.open{opacity:1;pointer-events:auto}
.mobile-panel{position:fixed;top:0;right:0;bottom:0;width:300px;background:var(--white);z-index:999;transform:translateX(100%);transition:transform 0.4s var(--ease);padding:80px 24px 24px;display:flex;flex-direction:column;gap:4px}
.mobile-panel.open{transform:translateX(0)}
.mobile-link{padding:14px 16px;font-size:1rem;font-weight:500;border-radius:10px;transition:all 0.2s;color:var(--g700)}
.mobile-link:hover{background:var(--g50)}

/* Hero */
.hero{min-height:100vh;display:flex;align-items:center;position:relative;background:linear-gradient(145deg,rgba(15,27,45,0.88) 0%,rgba(26,42,66,0.85) 45%,rgba(30,58,95,0.88) 100%);overflow:hidden;padding-top:76px}
.hero-bg-image{position:absolute;inset:0;z-index:0}
.hero-bg-image img{width:100%;height:100%;object-fit:cover}
.hero-bg-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
.hero-bg-orb-1{width:600px;height:600px;top:-200px;right:-100px;background:rgba(201,168,76,0.07)}
.hero-bg-orb-2{width:400px;height:400px;bottom:-100px;left:-100px;background:rgba(13,148,136,0.06)}
.hero-grid-pattern{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.hero-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;position:relative;z-index:2}
.hero-content{animation:slideLeft 0.9s var(--ease) forwards}
.hero-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);padding:8px 18px;border-radius:28px;font-size:0.78rem;color:var(--gold-light);font-weight:600;margin-bottom:28px;backdrop-filter:blur(8px)}
.hero-badge-dot{width:8px;height:8px;background:var(--teal-light);border-radius:50%;animation:pulse 2s ease-in-out infinite}
.hero h1{font-size:clamp(2.4rem,5.5vw,3.8rem);font-weight:400;color:var(--white);margin-bottom:20px;line-height:1.1}
.hero h1 .gold{color:var(--gold)}
.hero-desc{font-size:1.05rem;color:rgba(255,255,255,0.65);max-width:500px;margin-bottom:36px;line-height:1.75;font-family:'DM Sans',sans-serif}
.hero-btns{display:flex;gap:16px;flex-wrap:wrap}
.btn-gold{padding:15px 36px;background:var(--gold);color:var(--navy);border-radius:8px;font-weight:700;font-size:0.95rem;transition:all 0.3s;display:inline-flex;align-items:center;gap:10px;font-family:'DM Sans',sans-serif;position:relative;overflow:hidden}
.btn-gold:hover{background:var(--gold-light);transform:translateY(-3px);box-shadow:0 12px 32px rgba(201,168,76,0.35)}
.btn-ghost{padding:15px 36px;border:1.5px solid rgba(255,255,255,0.25);color:var(--white);border-radius:8px;font-weight:600;font-size:0.95rem;transition:all 0.3s;font-family:'DM Sans',sans-serif}
.btn-ghost:hover{border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.05)}

.hero-visual{animation:slideRight 0.9s 0.2s var(--ease) both}
.hero-card-main{background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:36px;position:relative}
.hero-card-glow{position:absolute;top:-1px;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.hero-icon-box{width:52px;height:52px;background:var(--gold);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;animation:float 6s ease-in-out infinite}
.hero-card-main h3{color:var(--white);font-size:1.25rem;margin-bottom:10px}
.hero-card-main p{color:rgba(255,255,255,0.55);font-size:0.92rem;line-height:1.65;font-family:'DM Sans',sans-serif}
.hero-mini-stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:24px}
.hero-mini-stat{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:18px;text-align:center;transition:all 0.3s}
.hero-mini-stat:hover{background:rgba(255,255,255,0.08);transform:translateY(-2px)}
.hero-mini-stat-num{font-size:1.7rem;font-weight:800;color:var(--gold);font-family:'DM Sans',sans-serif}
.hero-mini-stat-label{font-size:0.7rem;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.12em;margin-top:4px;font-family:'DM Sans',sans-serif}

/* Floating particles */
.particle{position:absolute;border-radius:50%;background:rgba(201,168,76,0.15);pointer-events:none;animation:float 8s ease-in-out infinite}

/* Section base */
.section{padding:100px 0}
.container{max-width:1200px;margin:0 auto;padding:0 24px}
.section-label{display:inline-block;font-size:0.72rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--teal);margin-bottom:14px;font-family:'DM Sans',sans-serif;position:relative;padding-left:24px}
.section-label::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:16px;height:2px;background:var(--teal)}
.section-title{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:400;color:var(--navy);margin-bottom:16px}
.section-desc{font-size:1rem;color:var(--g500);max-width:600px;line-height:1.75}

/* About */
.about{background:var(--white)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center}
.about-img-area{position:relative}
.about-img-box{width:100%;height:440px;border-radius:var(--radius-lg);position:relative;overflow:hidden}
.about-img-box img{width:100%;height:100%;object-fit:cover}
.about-img-box::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(15,27,45,0.15) 0%,rgba(13,148,136,0.1) 100%)}
.about-float-card{position:absolute;bottom:-20px;right:-20px;background:var(--white);border-radius:14px;padding:20px 24px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:14px;animation:float 5s ease-in-out infinite 1s}
.about-float-card-num{font-size:1.6rem;font-weight:800;color:var(--teal);font-family:'DM Sans',sans-serif}
.about-float-card-text{font-size:0.78rem;color:var(--g500);font-weight:600;text-transform:uppercase;letter-spacing:0.08em}
.about-features{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:32px}
.about-feat{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--g50);border-radius:var(--radius);transition:all 0.3s;cursor:default}
.about-feat:hover{background:var(--white);box-shadow:var(--shadow);transform:translateX(4px)}
.about-feat-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.about-feat-icon.teal{background:var(--teal-dim);color:var(--teal)}
.about-feat-icon.gold{background:var(--gold-dim);color:var(--gold)}
.about-feat-icon.navy{background:rgba(15,27,45,0.08);color:var(--navy)}
.about-feat-text{font-size:0.84rem;font-weight:600;color:var(--navy);font-family:'DM Sans',sans-serif}

/* Vision Mission */
.vm-section{background:var(--off-white);position:relative}
.vm-bg-image{position:absolute;inset:0;opacity:0.04;z-index:0}
.vm-bg-image img{width:100%;height:100%;object-fit:cover}
.vm-section .container{position:relative;z-index:1}
.vm-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:48px}
.vm-card{background:var(--white);border-radius:var(--radius-lg);padding:44px 36px;border:1px solid var(--g200);transition:all 0.4s var(--ease);position:relative;overflow:hidden;cursor:default}
.vm-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-6px)}
.vm-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;transition:height 0.3s}
.vm-card:hover::before{height:6px}
.vm-card.visi::before{background:linear-gradient(90deg,var(--navy),var(--navy-mid))}
.vm-card.misi::before{background:linear-gradient(90deg,var(--teal),var(--teal-light))}
.vm-card-icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:22px;font-size:1.5rem;transition:transform 0.3s}
.vm-card:hover .vm-card-icon{transform:scale(1.1) rotate(-5deg)}
.vm-card.visi .vm-card-icon{background:rgba(15,27,45,0.07)}
.vm-card.misi .vm-card-icon{background:var(--teal-dim)}
.vm-card h3{font-size:1.35rem;color:var(--navy);margin-bottom:14px}
.vm-card p{color:var(--g600);line-height:1.8;font-family:'DM Sans',sans-serif}

/* Services */
.services{background:var(--white)}
.services-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;margin-top:48px}
.svc-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--radius-lg);padding:32px 24px;transition:all 0.4s var(--ease);position:relative;overflow:hidden;cursor:default}
.svc-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;transform:scaleX(0);transition:transform 0.4s var(--ease)}
.svc-card:hover::after{transform:scaleX(1)}
.svc-card:nth-child(1)::after{background:var(--navy)}
.svc-card:nth-child(2)::after{background:#d97706}
.svc-card:nth-child(3)::after{background:var(--teal)}
.svc-card:nth-child(4)::after{background:#db2777}
.svc-card:nth-child(5)::after{background:#2563eb}
.svc-card:hover{border-color:transparent;box-shadow:var(--shadow-lg);transform:translateY(-8px)}
.svc-num{font-size:0.68rem;font-weight:700;letter-spacing:0.15em;color:var(--teal);margin-bottom:18px;font-family:'DM Sans',sans-serif}
.svc-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;transition:transform 0.3s}
.svc-card:hover .svc-icon{transform:scale(1.1)}
.svc-card h3{font-size:0.98rem;font-weight:700;color:var(--navy);margin-bottom:8px;font-family:'DM Sans',sans-serif}
.svc-card p{font-size:0.84rem;color:var(--g500);line-height:1.6;font-family:'DM Sans',sans-serif}
.svc-tag{display:inline-block;margin-top:14px;padding:5px 12px;background:var(--g50);border-radius:20px;font-size:0.68rem;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:0.06em;font-family:'DM Sans',sans-serif}

/* Stats */
.stats-section{background:var(--navy);padding:88px 0;position:relative;overflow:hidden}
.stats-section::before{content:'';position:absolute;top:-50%;right:-20%;width:60%;height:200%;background:radial-gradient(ellipse,rgba(201,168,76,0.05),transparent 60%)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;position:relative;z-index:1}
.stat-item{text-align:center;padding:32px;border-radius:var(--radius-lg);transition:all 0.3s;cursor:default}
.stat-item:hover{background:rgba(255,255,255,0.04)}
.stat-num{font-size:clamp(2.8rem,5vw,3.8rem);font-weight:800;color:var(--gold);line-height:1;font-family:'DM Sans',sans-serif;position:relative;display:inline-block}
.stat-num .suffix{font-size:0.6em;position:relative;top:-0.1em}
.stat-label{font-size:0.82rem;color:rgba(255,255,255,0.9);font-weight:600;margin-top:10px;text-transform:uppercase;letter-spacing:0.12em;font-family:'DM Sans',sans-serif}
.stat-desc{font-size:0.78rem;color:rgba(255,255,255,0.4);margin-top:8px;line-height:1.5;font-family:'DM Sans',sans-serif}
.stat-divider{width:40px;height:3px;background:var(--gold);opacity:0.3;margin:10px auto 0;border-radius:2px}

/* Advantage */
.advantage{background:var(--off-white);position:relative;overflow:hidden}
.adv-bg-image{position:absolute;inset:0;opacity:0.05;z-index:0}
.adv-bg-image img{width:100%;height:100%;object-fit:cover}
.advantage .container{position:relative;z-index:1}
.adv-quote{font-size:1.1rem;font-style:italic;color:var(--g600);margin-top:8px;margin-bottom:48px;max-width:580px}
.adv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
.adv-card{background:var(--white);border-radius:var(--radius-lg);padding:40px 32px;border:1px solid var(--g200);transition:all 0.4s var(--ease);text-align:center;cursor:default;position:relative;overflow:hidden}
.adv-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-6px);border-color:transparent}
.adv-card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:80px;height:80px;border-radius:50%;filter:blur(40px);opacity:0;transition:opacity 0.4s}
.adv-card:hover::before{opacity:1}
.adv-card:nth-child(1)::before{background:var(--navy)}
.adv-card:nth-child(2)::before{background:var(--teal)}
.adv-card:nth-child(3)::before{background:var(--gold)}
.adv-num{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-weight:800;font-size:1.1rem;color:var(--white);transition:transform 0.3s;font-family:'DM Sans',sans-serif;position:relative;z-index:1}
.adv-card:hover .adv-num{transform:scale(1.15)}
.adv-card:nth-child(1) .adv-num{background:var(--navy)}
.adv-card:nth-child(2) .adv-num{background:var(--teal)}
.adv-card:nth-child(3) .adv-num{background:var(--gold);color:var(--navy)}
.adv-card h3{font-size:1.2rem;color:var(--navy);margin-bottom:10px;position:relative;z-index:1}
.adv-card p{font-size:0.88rem;color:var(--g500);line-height:1.65;font-family:'DM Sans',sans-serif;position:relative;z-index:1}

/* CSR */
.csr{background:var(--white)}
.csr-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:48px}
.csr-card{display:flex;align-items:flex-start;gap:18px;padding:28px;background:var(--g50);border-radius:var(--radius-lg);transition:all 0.4s var(--ease);cursor:default;border:1px solid transparent}

// ============ HOOKS ============
function useInView(options = {}) {
  const ref = useRef(null);
  const [isVisible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setVisible(true); obs.unobserve(el); }
    }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px', ...options });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, isVisible];
}

function useCountUp(target, isVisible, duration = 1800) {
  const [count, setCount] = useState(0);
  useEffect(() => {
    if (!isVisible) return;
    let start = 0;
    const step = Math.ceil(target / (duration / 16));
    const timer = setInterval(() => {
      start += step;
      if (start >= target) { start = target; clearInterval(timer); }
      setCount(start);
    }, 16);
    return () => clearInterval(timer);
  }, [isVisible, target]);
  return count;
}

function useScrollProgress() {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const total = document.documentElement.scrollHeight - window.innerHeight;
      setProgress(total > 0 ? (window.scrollY / total) * 100 : 0);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return progress;
}

// ============ ANIMATED ITEM COMPONENT ============
function AnimatedItem({ children, className = '', delay = 0, as = 'div' }) {
  const [ref, visible] = useInView();
  const Tag = as;
  return (
    <Tag ref={ref} className={`stagger-item${visible ? ' visible' : ''} ${className}`} style={{ transitionDelay: visible ? `${delay * 0.1}s` : '0s' }}>
      {children}
    </Tag>
  );
}

// ============ NAVIGATION ============
function Navigation() {
  const { lang, setLang } = useLang();
  const [scrolled, setScrolled] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [activeSection, setActiveSection] = useState('');

  useEffect(() => {
    const onScroll = () => {
      setScrolled(window.scrollY > 40);
      const sections = document.querySelectorAll('section[id]');
      let current = '';
      sections.forEach(s => { if (window.scrollY >= s.offsetTop - 120) current = s.id; });
      setActiveSection(current);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const links = [
    { id: 'about', label: t(translations.nav.about, lang) },
    { id: 'services', label: t(translations.nav.services, lang) },
    { id: 'advantage', label: t(translations.nav.whyUs, lang) },
    { id: 'team', label: t(translations.nav.team, lang) },
    { id: 'contact', label: t(translations.nav.contact, lang) },
  ];

  const scrollTo = (id) => {
    document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
    setMobileOpen(false);
  };

  return (
    <>
      <nav className={`nav${scrolled ? ' scrolled' : ''}`}>
        <div className="nav-inner">
          <a href="#hero" className="nav-logo" onClick={(e) => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); }}>
            <div className="nav-logo-icon"><img src="images/logo.jpg" alt="IBP & Dirman Logo"/></div>
            <span>IBP & Dirman</span>
          </a>
          <div className="nav-links">
            {links.map(l => (
              <a key={l.id} href={`#${l.id}`} className={`nav-link-item${activeSection === l.id ? ' active' : ''}`}
                onClick={(e) => { e.preventDefault(); scrollTo(l.id); }}>{l.label}</a>
            ))}
          </div>
          <div className="nav-actions">
            <div className="lang-switch">
              <button className={`lang-btn${lang === 'id' ? ' active' : ''}`} onClick={() => setLang('id')}>ID</button>
              <button className={`lang-btn${lang === 'en' ? ' active' : ''}`} onClick={() => setLang('en')}>EN</button>
            </div>
            <a href="#contact" className="nav-cta-btn" onClick={(e) => { e.preventDefault(); scrollTo('contact'); }}>
              {t(translations.nav.cta, lang)}
            </a>
          </div>
          <button className={`hamburger${mobileOpen ? ' open' : ''}`} onClick={() => setMobileOpen(!mobileOpen)} aria-label="Menu">
            <span/><span/><span/>
          </button>
        </div>
      </nav>
      <div className={`mobile-overlay${mobileOpen ? ' open' : ''}`} onClick={() => setMobileOpen(false)}/>
      <div className={`mobile-panel${mobileOpen ? ' open' : ''}`}>
        {links.map(l => (
          <a key={l.id} href={`#${l.id}`} className="mobile-link" onClick={(e) => { e.preventDefault(); scrollTo(l.id); }}>{l.label}</a>
        ))}
        <div className="lang-switch" style={{ marginTop: 16, alignSelf: 'flex-start' }}>
          <button className={`lang-btn${lang === 'id' ? ' active' : ''}`} onClick={() => setLang('id')}>ID</button>
          <button className={`lang-btn${lang === 'en' ? ' active' : ''}`} onClick={() => setLang('en')}>EN</button>
        </div>
      </div>
    </>
  );
}

      opacity: visible ? 1 : 0,
      transform: visible ? 'translateY(0) scale(1)' : 'translateY(30px) scale(0.97)',

      transitionDelay: visible ? `${delay * 0.15}s` : '0s',

      <div className="stat-num">{count}<span className="suffix">+</span></div>
      <div className="stat-label">{label}</div>
      <div className="stat-divider"/>
      <div className="stat-desc">{desc}</div>

  );

          <a href="#" className="footer-link">{t(f.terms, lang)}</a>
        </div>
      </div>
    </footer>
  );
}

// ============ BACK TO TOP ============
function BackToTop() {
  const [show, setShow] = useState(false);
  useEffect(() => {
    const onScroll = () => setShow(window.scrollY > 400);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <button className={`btt${show ? ' show' : ''}`}
      onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
      {Icons.arrowUp}
    </button>
  );
}

// ============ APP ============
function App() {
  const [lang, setLang] = useState('id');
  const progress = useScrollProgress();

  return (
    <LangContext.Provider value={{ lang, setLang }}>
      <div className="scroll-progress" style={{ width: `${progress}%` }}/>
      <Navigation/>
      <Hero/>
      <About/>
      <VisionMission/>
      <Services/>
      <Stats/>
      <Advantage/>
      <CSR/>
      <Team/>
      <Contact/>
      <Footer/>
      <BackToTop/>
    </LangContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
